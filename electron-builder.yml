appId: ai.pegasus.ide
productName: PegasusAI
copyright: Copyright © 2024 PegasusAI Committee
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - out/**/*
      - resources/**/*
      - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
      - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
      - '!**/node_modules/.bin'
      - '!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}'
      - '!.editorconfig'
      - '!**/._*'
      - '!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}'
      - '!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}'
      - '!**/{appveyor.yml,.travis.yml,circle.yml}'
      - '!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}'
extraMetadata:
  main: out/main.js
  name: pegasusai
  version: 0.1.0
mac:
  category: public.app-category.developer-tools
  icon: resources/icons/mac/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize:
    teamId: "" # Preencher com Team ID da Apple se for distribuir
win:
  icon: resources/icons/win/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  requestedExecutionLevel: asInvoker
  rfc3161TimeStampServer: http://timestamp.digicert.com
  signingHashAlgorithms:
    - sha256
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: resources/installer.nsh
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: PegasusAI
  uninstallDisplayName: PegasusAI
  license: LICENSE
linux:
  icon: resources/icons/png/icon-512x512.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Development
  mimeTypes:
    - x-scheme-handler/pegasusai
  desktop:
    Name: PegasusAI
    Comment: IDE Inteligente Offline-First
    GenericName: Code Editor
    Keywords: development;programming;ide;code;pegasus;
    StartupNotify: true
    StartupWMClass: PegasusAI
publish:
  provider: generic
  url: https://releases.pegasusai.dev
  channel: latest
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
